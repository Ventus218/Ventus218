name: Release a PDF version of CV

on:
  push:
    branches: [main]
    paths:
      - "cv/**"
      - ".github/workflows/release-cv-pdf.yaml"

permissions:
  contents: write

jobs:
  release-cv-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install rendercv
        run: pipx install "rendercv[full]==2.8"

      - name: Generate PDF
        run: rendercv render cv/Alessandro_Venturini_CV.yaml

      - name: Set release metadata
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "TAG_NAME=cv-${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=CV ${SHORT_SHA}" >> "$GITHUB_ENV"

      - name: Create GitHub release and upload PDF
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          target_commitish: ${{ github.sha }}
          name: ${{ env.RELEASE_NAME }}
          files: cv/rendercv-out/Alessandro_Venturini_CV.pdf
          prerelease: false
          generate_release_notes: false
          body: |
            Automated CV PDF build for commit ${{ github.sha }}.
